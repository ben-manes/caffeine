name: Qlty
permissions: {}
on: [ push, pull_request, workflow_dispatch ]
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Qlty Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read # Needed for uploading security scan results
      security-events: write # Needed for uploading security scan results
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            api.segment.io:443
            cdp.customer.io:443
            github-proxy.qlty.sh:443
            github.com:443
            qlty-releases.s3.amazonaws.com:443
            qlty.sh:443
            radarlint-releases.s3.amazonaws.com:443
            release-assets.githubusercontent.com:443
            tmaproduction.blob.core.windows.net:443
            tuf-repo-cdn.sigstore.dev:443
            tuf-repo.github.com:443
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install Qlty
        uses: qltysh/qlty-action/install@fd52dc852530a708d68c3b7342f8d33d1df4cd55 # v2.2.1
      - name: Setup Qlty
        run: |
          qlty init --skip-plugins -n
          qlty plugins enable ktlint radarlint-java radarlint-kotlin trufflehog
      - name: Run Qlty Check
        continue-on-error: true
        run: |
          qlty check --no-fail --no-formatters --sarif . > results.sarif
          # Remove invalid tool.driver.notifications array which causes sarif validation failures
          if [ -f results.sarif ]; then
            tmp=$(mktemp)
            jq 'del(.runs[].tool.driver.notifications) | del(.runs[].results[].taxa[].name)' \
              results.sarif > "$tmp" && mv "$tmp" results.sarif
          fi
      - name: Check file existence
        id: check_files
        uses: andstor/file-existence-action@558493d6c74bf472d87c84eab196434afc2fa029 # v3.1.0
        with:
          files: results.sarif
      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: steps.check_files.outputs.files_exists == 'true'
        with:
          sarif_file: results.sarif

  smells:
    name: Qlty Smells
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read # Needed for uploading security scan results
      security-events: write # Needed for uploading security scan results
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            api.segment.io:443
            cdp.customer.io:443
            github.com:443
            qlty-releases.s3.amazonaws.com:443
            qlty.sh:443
            tmaproduction.blob.core.windows.net:443
            tuf-repo-cdn.sigstore.dev:443
            tuf-repo.github.com:443
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install Qlty
        uses: qltysh/qlty-action/install@fd52dc852530a708d68c3b7342f8d33d1df4cd55 # v2.2.1
      - name: Setup Qlty
        run: |
          qlty init --skip-plugins -n
          qlty plugins enable ktlint radarlint-java radarlint-kotlin trufflehog
      - name: Run Qlty Smells
        continue-on-error: true
        run: |
          qlty smells --include-tests --sarif . > results.sarif
          # Remove invalid tool.driver.notifications array which causes sarif validation failures
          if [ -f results.sarif ]; then
            tmp=$(mktemp)
            jq 'del(.runs[].tool.driver.notifications) | del(.runs[].results[].taxa[].name)' \
              results.sarif > "$tmp" && mv "$tmp" results.sarif
          fi
      - name: Check file existence
        id: check_files
        uses: andstor/file-existence-action@558493d6c74bf472d87c84eab196434afc2fa029 # v3.1.0
        with:
          files: results.sarif
      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: steps.check_files.outputs.files_exists == 'true'
        with:
          sarif_file: results.sarif
