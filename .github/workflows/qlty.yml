name: Qlty
permissions: {}
on: [ push, pull_request, workflow_dispatch ]
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Qlty Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read # Needed for uploading security scan results
      security-events: write # Needed for uploading security scan results
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            api.segment.io:443
            cdp.customer.io:443
            github-proxy.qlty.sh:443
            github.com:443
            maven-central.storage-download.googleapis.com:443
            qlty-releases.s3.amazonaws.com:443
            qlty.sh:443
            radarlint-releases.s3.amazonaws.com:443
            release-assets.githubusercontent.com:443
            tmaproduction.blob.core.windows.net:443
            tuf-repo-cdn.sigstore.dev:443
            tuf-repo.github.com:443
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install Qlty
        uses: qltysh/qlty-action/install@08a0a862c159eae9b9003081da6663d96efef637 # v2.3.0
      - name: Setup Qlty
        run: |
          qlty init --skip-plugins -n
          qlty plugins enable ktlint radarlint-java radarlint-kotlin trufflehog
          # Test methods use the method_scenario_expectation convention (underscores); silence
          # radarlint/Sonar S100 (method naming) for test sources, matching the gradle PMD config.
          printf '\n[[triage]]\nmatch.rules = ["radarlint-java:java:S100"]\nmatch.file_patterns = ["**/src/test/**"]\nset.ignored = true\n' >> .qlty/qlty.toml
      - name: Run Qlty Check
        continue-on-error: true
        run: |
          qlty check --no-fail --no-formatters --sarif . > results.sarif
          # Remove invalid tool.driver.notifications array which causes sarif validation failures
          if [ -f results.sarif ]; then
            tmp=$(mktemp)
            jq 'del(.runs[].tool.driver.notifications) | del(.runs[].results[].taxa[].name)' \
              results.sarif > "$tmp" && mv "$tmp" results.sarif
          fi
      - name: Check file existence
        id: check_files
        uses: andstor/file-existence-action@558493d6c74bf472d87c84eab196434afc2fa029 # v3.1.0
        with:
          files: results.sarif
      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        if: steps.check_files.outputs.files_exists == 'true'
        with:
          sarif_file: results.sarif

  smells:
    name: Qlty Smells
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read # Needed for uploading security scan results
      security-events: write # Needed for uploading security scan results
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            api.segment.io:443
            cdp.customer.io:443
            github.com:443
            qlty-releases.s3.amazonaws.com:443
            qlty.sh:443
            tmaproduction.blob.core.windows.net:443
            tuf-repo-cdn.sigstore.dev:443
            tuf-repo.github.com:443
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install Qlty
        uses: qltysh/qlty-action/install@08a0a862c159eae9b9003081da6663d96efef637 # v2.3.0
      - name: Setup Qlty
        run: |
          qlty init --skip-plugins -n
          qlty plugins enable ktlint radarlint-java radarlint-kotlin trufflehog
      - name: Run Qlty Smells
        continue-on-error: true
        run: |
          qlty smells --include-tests --sarif . > results.sarif
          # Remove invalid tool.driver.notifications array which causes sarif validation failures
          if [ -f results.sarif ]; then
            tmp=$(mktemp)
            jq 'del(.runs[].tool.driver.notifications) | del(.runs[].results[].taxa[].name)' \
              results.sarif > "$tmp" && mv "$tmp" results.sarif
          fi
      - name: Check file existence
        id: check_files
        uses: andstor/file-existence-action@558493d6c74bf472d87c84eab196434afc2fa029 # v3.1.0
        with:
          files: results.sarif
      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        if: steps.check_files.outputs.files_exists == 'true'
        with:
          sarif_file: results.sarif
